<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="indigo">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voyagora — From idea to itinerary in minutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />

<!-- React + Babel from CDN (no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ============================================================
   Theme tokens
   ============================================================ */
:root {
  --font: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;

  /* accent: indigo (default) */
  --accent-1: #4f46e5;
  --accent-2: #2563eb;
  --accent-soft: rgba(79, 70, 229, 0.12);

  /* light surfaces */
  --bg: #f6f7fb;
  --bg-grad-1: #eef1ff;
  --bg-grad-2: #f6f7fb;
  --surface: #ffffff;
  --surface-2: #f4f5fa;
  --surface-3: #eceefa;
  --border: #e6e8f0;
  --border-strong: #d6d9e6;
  --text: #131523;
  --text-soft: #4c5066;
  --text-faint: #818699;
  --shadow-sm: 0 1px 2px rgba(20, 22, 40, 0.05), 0 4px 14px rgba(20, 22, 40, 0.05);
  --shadow-md: 0 6px 28px rgba(20, 22, 40, 0.10);
  --shadow-lg: 0 18px 50px rgba(20, 22, 40, 0.16);
  --danger: #dc2626;
  --danger-soft: rgba(220, 38, 38, 0.10);
  --ok: #0e9f6e;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-pill: 999px;
}

[data-accent="teal"] {
  --accent-1: #0d9488;
  --accent-2: #0ea5a4;
  --accent-soft: rgba(13, 148, 136, 0.12);
}
[data-accent="sky"] {
  --accent-1: #0284c7;
  --accent-2: #0ea5e9;
  --accent-soft: rgba(2, 132, 199, 0.12);
}

[data-theme="dark"] {
  --bg: #0b0d16;
  --bg-grad-1: #121529;
  --bg-grad-2: #0b0d16;
  --surface: #161a2b;
  --surface-2: #1c2138;
  --surface-3: #232843;
  --border: #2a3050;
  --border-strong: #353c61;
  --text: #f2f3f8;
  --text-soft: #b6bbd0;
  --text-faint: #828aa6;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 6px 18px rgba(0, 0, 0, 0.35);
  --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 20px 55px rgba(0, 0, 0, 0.55);
  --danger-soft: rgba(248, 113, 113, 0.14);
  --accent-soft: rgba(255, 255, 255, 0.07);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background:
    radial-gradient(1200px 600px at 80% -10%, var(--bg-grad-1), transparent 60%),
    var(--bg-grad-2);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  min-height: 100vh;
}
a { color: inherit; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent-soft); }

/* ============================================================
   Layout helpers
   ============================================================ */
.container { width: 100%; max-width: 1160px; margin: 0 auto; padding: 0 22px; }
.gradient-text {
  background: linear-gradient(100deg, var(--accent-1), var(--accent-2));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(180%) blur(12px);
  background: color-mix(in srgb, var(--surface) 78%, transparent);
  border-bottom: 1px solid var(--border);
}
.header-inner { display: flex; align-items: center; justify-content: space-between; height: 66px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 19px; letter-spacing: -0.02em; }
.logo .mark {
  width: 34px; height: 34px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  display: grid; place-items: center; color: #fff; box-shadow: var(--shadow-sm);
}
.header-actions { display: flex; align-items: center; gap: 10px; }

/* Buttons */
.btn {
  border: none; border-radius: var(--radius-pill);
  padding: 11px 20px; font-weight: 700; font-size: 14.5px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  color: #fff;
  background: linear-gradient(100deg, var(--accent-1), var(--accent-2));
  box-shadow: 0 6px 18px var(--accent-soft);
}
.btn-primary:hover { box-shadow: 0 10px 26px var(--accent-soft); transform: translateY(-1px); }
.btn-ghost {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.btn-ghost:hover { border-color: var(--border-strong); }
.btn-soft {
  background: var(--surface-2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-soft:hover { background: var(--surface-3); }
.icon-btn {
  width: 42px; height: 42px; border-radius: 12px;
  display: grid; place-items: center;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); box-shadow: var(--shadow-sm);
}
.icon-btn:hover { border-color: var(--border-strong); }

/* ============================================================
   Hero
   ============================================================ */
.hero { padding: 70px 0 30px; position: relative; overflow: hidden; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--accent-soft); color: var(--accent-1);
  font-weight: 700; font-size: 13px; padding: 7px 14px; border-radius: var(--radius-pill);
  margin-bottom: 22px;
}
[data-theme="dark"] .hero-badge { color: var(--text); }
.hero h1 {
  font-size: clamp(34px, 6vw, 60px); line-height: 1.04; letter-spacing: -0.035em;
  font-weight: 800; margin: 0 0 18px; max-width: 14ch;
}
.hero p.lead {
  font-size: clamp(16px, 2.2vw, 20px); color: var(--text-soft);
  max-width: 56ch; margin: 0 0 30px;
}
.hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-orb {
  position: absolute; border-radius: 50%; filter: blur(40px); opacity: .5; z-index: -1;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
}
.orb-a { width: 320px; height: 320px; top: -90px; right: -60px; opacity: .28; }
.orb-b { width: 240px; height: 240px; bottom: -120px; left: -80px; opacity: .20; }

/* feature / how rows */
.section-eyebrow { font-weight: 800; letter-spacing: .12em; text-transform: uppercase; font-size: 12px; color: var(--accent-1); }
.section-title { font-size: clamp(24px, 3.4vw, 34px); font-weight: 800; letter-spacing: -0.03em; margin: 8px 0 6px; }
.section-sub { color: var(--text-soft); max-width: 60ch; margin: 0 0 26px; }

.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm);
}
.feature-icon {
  width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center;
  background: var(--accent-soft); color: var(--accent-1); margin-bottom: 14px;
}
[data-theme="dark"] .feature-icon { color: var(--text); }
.feature-card h3 { margin: 0 0 6px; font-size: 17px; letter-spacing: -0.01em; }
.feature-card p { margin: 0; color: var(--text-soft); font-size: 14.5px; }

.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; counter-reset: step; }
.step { position: relative; padding-left: 4px; }
.step .num {
  width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center;
  font-weight: 800; color: #fff;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
  margin-bottom: 12px; box-shadow: var(--shadow-sm);
}
.step h4 { margin: 0 0 5px; font-size: 16px; }
.step p { margin: 0; color: var(--text-soft); font-size: 14px; }

.section { padding: 36px 0; }

/* ============================================================
   Planner form
   ============================================================ */
.planner-wrap { padding: 14px 0 60px; }
.planner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 26px; box-shadow: var(--shadow-md); padding: 30px;
}
.planner-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
.planner-head h2 { margin: 0 0 4px; font-size: 26px; letter-spacing: -0.03em; }
.planner-head p { margin: 0; color: var(--text-soft); }

.field { margin-bottom: 22px; }
.field-label { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 9px; }
.field-label .req { color: var(--accent-1); }
.field-hint { font-weight: 500; color: var(--text-faint); font-size: 12.5px; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

.input, .textarea, .date {
  width: 100%; padding: 13px 15px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
  font-size: 15px; font-family: inherit; transition: border-color .15s, box-shadow .15s, background .15s;
}
.input::placeholder, .textarea::placeholder { color: var(--text-faint); }
.input:focus, .textarea:focus, .date:focus {
  outline: none; border-color: var(--accent-1);
  box-shadow: 0 0 0 4px var(--accent-soft); background: var(--surface);
}
.textarea { resize: vertical; min-height: 84px; }
.input-icon-wrap { position: relative; }
.input-icon-wrap .lead-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }
.input-icon-wrap .input { padding-left: 42px; }
.date { color-scheme: light; }
[data-theme="dark"] .date { color-scheme: dark; }

.field.invalid .input, .field.invalid .textarea, .field.invalid .date,
.field.invalid .seg-group, .field.invalid .chips { box-shadow: 0 0 0 3px var(--danger-soft); border-radius: var(--radius-sm); }
.err-msg { color: var(--danger); font-size: 13px; font-weight: 600; margin-top: 7px; display: flex; gap: 6px; align-items: center; }

/* stepper */
.stepper { display: inline-flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--surface-2); overflow: hidden; }
.stepper button { width: 46px; height: 46px; border: none; background: transparent; color: var(--text); font-size: 20px; font-weight: 700; display: grid; place-items: center; }
.stepper button:hover { background: var(--surface-3); }
.stepper .val { min-width: 56px; text-align: center; font-weight: 800; font-size: 17px; }

/* segmented */
.seg-group { display: flex; flex-wrap: wrap; gap: 10px; }
.seg {
  flex: 1 1 auto; min-width: 110px;
  border: 1px solid var(--border); background: var(--surface-2);
  border-radius: 14px; padding: 12px 14px; text-align: left;
  transition: all .14s ease; color: var(--text);
}
.seg:hover { border-color: var(--border-strong); }
.seg .seg-main { font-weight: 700; font-size: 14.5px; display: block; }
.seg .seg-sub { font-size: 12px; color: var(--text-faint); }
.seg.active {
  border-color: transparent; color: #fff;
  background: linear-gradient(100deg, var(--accent-1), var(--accent-2));
  box-shadow: 0 6px 16px var(--accent-soft);
}
.seg.active .seg-sub { color: rgba(255,255,255,.82); }

/* chips */
.chips { display: flex; flex-wrap: wrap; gap: 10px; }
.chip {
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
  border-radius: var(--radius-pill); padding: 9px 16px; font-weight: 650; font-size: 14px;
  display: inline-flex; align-items: center; gap: 7px; transition: all .14s ease;
}
.chip:hover { border-color: var(--border-strong); }
.chip.active {
  border-color: transparent; color: #fff;
  background: linear-gradient(100deg, var(--accent-1), var(--accent-2));
  box-shadow: 0 5px 14px var(--accent-soft);
}
.chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-1); }
.chip.active .dot { background: #fff; }

.form-footer { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; padding-top: 22px; border-top: 1px solid var(--border); }
.form-footer .spacer { flex: 1; }
.form-footer .submit { padding: 14px 30px; font-size: 16px; }

/* ============================================================
   Loading
   ============================================================ */
.loading-screen {
  position: fixed; inset: 0; z-index: 100;
  display: grid; place-items: center; text-align: center;
  background:
    radial-gradient(900px 500px at 50% 0%, var(--bg-grad-1), transparent 60%),
    var(--bg-grad-2);
}
.loading-card { max-width: 460px; padding: 30px; }
.spinner { width: 64px; height: 64px; margin: 0 auto 26px; position: relative; }
.spinner::before, .spinner::after {
  content: ""; position: absolute; inset: 0; border-radius: 50%;
  border: 4px solid transparent;
}
.spinner::before { border-top-color: var(--accent-1); border-right-color: var(--accent-2); animation: spin 0.9s linear infinite; }
.spinner::after { inset: 9px; border-top-color: var(--accent-2); opacity: .5; animation: spin 1.4s linear infinite reverse; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-card h2 { font-size: 24px; margin: 0 0 8px; letter-spacing: -0.02em; }
.loading-status { color: var(--text-soft); font-size: 16px; min-height: 24px; }
.loading-dots span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-1); margin: 0 3px; animation: bounce 1s infinite; }
.loading-dots span:nth-child(2){ animation-delay: .15s; } .loading-dots span:nth-child(3){ animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{ transform: translateY(0); opacity:.5;} 40%{ transform: translateY(-7px); opacity:1;} }
.loading-dots { margin-top: 18px; }

/* ============================================================
   Itinerary
   ============================================================ */
.itin-header {
  border-radius: 26px; padding: 34px; color: #fff; margin: 24px 0 26px;
  background: linear-gradient(120deg, var(--accent-1), var(--accent-2));
  box-shadow: var(--shadow-lg); position: relative; overflow: hidden;
}
.itin-header::after {
  content:""; position:absolute; width: 360px; height: 360px; border-radius:50%;
  background: rgba(255,255,255,.12); top:-160px; right:-80px;
}
.itin-header .kicker { font-weight: 700; opacity: .9; font-size: 14px; display:flex; gap:8px; align-items:center; }
.itin-header h1 { margin: 8px 0 8px; font-size: clamp(26px, 4.4vw, 40px); letter-spacing: -0.035em; }
.itin-meta { display: flex; flex-wrap: wrap; gap: 18px; margin: 12px 0 16px; font-weight: 600; }
.itin-meta .m { display: inline-flex; gap: 8px; align-items: center; opacity: .95; }
.itin-summary { max-width: 70ch; opacity: .96; font-size: 16px; margin: 4px 0 16px; }
.pref-badges { display: flex; flex-wrap: wrap; gap: 9px; }
.pref-badge { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.25); padding: 6px 13px; border-radius: var(--radius-pill); font-weight: 650; font-size: 13.5px; }

/* booking buttons (on gradient header) */
.book-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; position: relative; z-index: 1; }
.book-btn {
  display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
  background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.32);
  color: #fff; padding: 10px 18px; border-radius: var(--radius-pill);
  font-weight: 700; font-size: 14px; transition: background .15s, transform .12s;
}
.book-btn:hover { background: rgba(255,255,255,.28); transform: translateY(-1px); }

/* booking card (weather sidebar) */
.book-card .book-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
.book-link {
  display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
  padding: 12px; border-radius: var(--radius-sm); text-decoration: none;
  font-weight: 700; font-size: 14.5px; color: var(--text);
  border: 1px solid var(--border); background: var(--surface-2); transition: all .15s;
}
.book-link:hover { border-color: var(--accent-1); transform: translateY(-1px); }
.book-link.primary { color: #fff; border-color: transparent; background: linear-gradient(100deg, var(--accent-1), var(--accent-2)); box-shadow: 0 6px 16px var(--accent-soft); }

.itin-grid { display: grid; grid-template-columns: 1fr 330px; gap: 24px; align-items: start; }
.weather-side { position: sticky; top: 82px; display: flex; flex-direction: column; gap: 16px; }
.side-title { font-weight: 800; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; color: var(--text-faint); margin: 2px 4px; }

/* day card */
.day-card { margin-bottom: 24px; }
.day-head { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; flex-wrap: wrap; }
.day-num {
  width: 44px; height: 44px; border-radius: 13px; flex: none;
  display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 17px;
  background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
}
.day-head h3 { margin: 0; font-size: 20px; letter-spacing: -0.02em; }
.day-date { background: var(--surface-3); color: var(--text-soft); font-weight: 700; font-size: 13px; padding: 5px 12px; border-radius: var(--radius-pill); }
.day-weather-line { color: var(--text-soft); font-weight: 600; font-size: 14px; margin: 6px 0 18px; display: flex; gap: 8px; align-items:center; }

.daypart { margin-bottom: 18px; }
.daypart-label { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 13px; letter-spacing: .05em; text-transform: uppercase; color: var(--accent-1); margin-bottom: 10px; }
[data-theme="dark"] .daypart-label { color: var(--text); }

.activity {
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 15px 16px; background: var(--surface-2); margin-bottom: 10px;
  transition: border-color .15s, transform .12s, box-shadow .15s;
}
.activity:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.activity-top { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; flex-wrap: wrap; }
.activity-time { font-weight: 800; font-size: 14px; color: var(--accent-1); min-width: 48px; }
[data-theme="dark"] .activity-time { color: var(--text); }
.activity-title { font-weight: 750; font-size: 16px; flex: 1; min-width: 140px; }
.io-badge { font-size: 11.5px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; padding: 4px 9px; border-radius: var(--radius-pill); }
.io-Indoor { background: rgba(37,99,235,.14); color: #2563eb; }
.io-Outdoor { background: rgba(14,159,110,.14); color: #0e9f6e; }
.io-Covered { background: rgba(217,119,6,.16); color: #d97706; }
.io-Mixed { background: rgba(139,92,246,.16); color: #8b5cf6; }
.activity-desc { color: var(--text-soft); font-size: 14.5px; margin: 4px 0 8px; }
.activity-meta { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; font-size: 13px; color: var(--text-faint); }
.activity-meta .why { color: var(--text-soft); font-style: italic; }
.activity-meta .cost { font-weight: 700; color: var(--text-soft); }
.map-link {
  display: inline-flex; align-items: center; gap: 5px; font-weight: 700; font-size: 13px;
  color: var(--accent-1); text-decoration: none; padding: 4px 10px; border-radius: var(--radius-pill);
  border: 1px solid var(--border); background: var(--surface);
}
.map-link:hover { border-color: var(--accent-1); }

.eat-list { display: flex; flex-direction: column; gap: 10px; }
.restaurant { display: flex; justify-content: space-between; align-items: center; gap: 12px; border: 1px solid var(--border); background: var(--surface-2); border-radius: var(--radius-sm); padding: 13px 15px; flex-wrap: wrap; }
.restaurant .r-name { font-weight: 750; font-size: 15px; }
.restaurant .r-meta { font-size: 13px; color: var(--text-faint); }
.r-match { font-size: 12px; font-weight: 800; color: var(--ok); background: rgba(14,159,110,.12); padding: 4px 10px; border-radius: var(--radius-pill); }

.callout { display: flex; gap: 12px; padding: 14px 16px; border-radius: var(--radius-sm); background: var(--accent-soft); border: 1px dashed var(--border-strong); margin-top: 14px; }
.callout .ct-title { font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.callout p { margin: 0; color: var(--text-soft); font-size: 14.5px; }

.day-footer { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.foot-chip { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 13px; color: var(--text-soft); background: var(--surface-2); border: 1px solid var(--border); padding: 7px 13px; border-radius: var(--radius-pill); }

.subhead { font-weight: 800; font-size: 15px; margin: 18px 0 10px; display:flex; gap:8px; align-items:center; }

/* weather card */
.weather-card { padding: 18px; }
.weather-card .wc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.weather-card .wc-day { font-weight: 800; font-size: 14px; }
.weather-card .wc-date { font-size: 12.5px; color: var(--text-faint); }

/* ============================================================
   API LAYER — never rejects, always resolves to a valid itinerary
   ============================================================ */
function defActivity(a = {}) {
  return {
    time: a.time || "",
    title: a.title || "Activity",
    description: a.description || "",
    location: a.location || "",
    indoorOutdoor: ["Indoor","Outdoor","Covered","Mixed"].includes(a.indoorOutdoor) ? a.indoorOutdoor : "Mixed",

}
function defRestaurant(r = {}) {
  return {
    name: r.name || "Local spot",
    cuisine: r.cuisine || "",
    foodPreferenceMatch: r.foodPreferenceMatch || "",
    location: r.location || "",
    estimatedCost: r.estimatedCost || "",
    mapUrl: r.mapUrl || "#",
  };
}
function defWeather(w = {}) {
  return {
    condition: w.condition || "Mild conditions",
    icon: ["rain","sun","cloud","partly","wind"].includes(w.icon) ? w.icon : "partly",
    temperature: (typeof w.temperature === "number") ? w.temperature : (parseInt(w.temperature) || null),
    rainProbability: (typeof w.rainProbability === "number") ? w.rainProbability : (parseInt(w.rainProbability) || 0),
    wind: w.wind || "Light winds",
    travelAdvice: w.travelAdvice || "",
  };
}
function defDay(d = {}, i = 0) {
  const arr = (x) => Array.isArray(x) ? x.map(defActivity) : [];
  return {
    dayNumber: d.dayNumber || (i + 1),
    date: d.date || "",
    theme: d.theme || ("Day " + (d.dayNumber || (i + 1))),
    weatherSummary: d.weatherSummary || "",
    weather: defWeather(d.weather),
    morning: arr(d.morning),
    afternoon: arr(d.afternoon),

    title: raw.title || ("Trip to " + (raw.destination || (req && req.destination) || "your destination")),
    summary: raw.summary || "",

// Deeply unwrap common n8n / model response shapes to find an object with `days`.
function extractItinerary(input, depth = 0) {
  if (depth > 8 || input == null) return null;

  // Strings: try fenced JSON, then plain JSON, else give up
  if (typeof input === "string") {
    const s = input.trim();
    if (!s) return null;
    const fence = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
    if (fence) {
      const inner = extractFromString(fence[1]);
      if (inner) { const f = extractItinerary(inner, depth + 1); if (f) return f; }
    }
    const parsed = extractFromString(s);
    if (parsed) return extractItinerary(parsed, depth + 1);
    return null;
  }

  if (Array.isArray(input)) {
    for (const el of input) { const f = extractItinerary(el, depth + 1); if (f) return f; }
    return null;
  }

  if (typeof input === "object") {
    if (Array.isArray(input.days)) return input;             // found it
    if (input.json !== undefined) { const f = extractItinerary(input.json, depth + 1); if (f) return f; }

    if (input.choices && input.choices[0] && input.choices[0].message) {

  try { return JSON.parse(s); } catch (e) {}

    const last = Math.max(s.lastIndexOf("}"), s.lastIndexOf("]"));

  if (Array.isArray(input)) {
    let best = "";
    for (const el of input) { const t = findRawText(el, depth + 1); if (t.length > best.length) best = t; }
    return best;
  }
  if (typeof input === "object") {
    if (typeof input.text === "string" && input.text.trim().length > 40) return input.text.trim();
    let best = "";
    const keys = ["output","content","message","response","answer","result","data","text","choices","output_text"];
    for (const k of keys) { if (input[k] !== undefined) { const t = findRawText(input[k], depth + 1); if (t.length > best.length) best = t; } }

async function planTrip(req) {
  let res;
  try {
    res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(req),
    });
  } catch (e) {
    return fallbackItinerary(req, "Couldn’t reach the planner",
      "Network request failed (\"" + (e && e.message ? e.message : "Failed to fetch") + "\"). " +
      "Make sure the n8n workflow is Active/published — the Production webhook URL only responds when the workflow is published, and the Test URL fires only once. " +
      "Also confirm the Webhook node’s CORS / Allowed Origins permits this page (use \"*\" for local file:// testing).");
  }

  if (!res.ok) {
    let body = "";
    try { body = await res.text(); } catch (e) {}
    return fallbackItinerary(req, "The planner returned an error",
      "The webhook responded with HTTP " + res.status + " " + (res.statusText || "") + ". " +
      (body ? "Details: " + body.slice(0, 240) : "Check the n8n execution log for what failed."));
  }

  let text = "";
  try { text = await res.text(); } catch (e) {
    return fallbackItinerary(req, "Empty response", "The webhook returned a response that couldn’t be read.");
  }

  let payload = null;
  try { payload = JSON.parse(text); } catch (e) { payload = text; } // may be plain text

  const found = extractItinerary(payload);
  if (!found) {
    // No structured itinerary — but if the model returned readable prose, show it nicely.
    const raw = findRawText(payload) || (typeof payload === "string" ? payload : "");
    if (raw && raw.length > 60) return rawTextItinerary(req, raw);
    return fallbackItinerary(req, "Unexpected response shape",
      "The planner replied, but we couldn’t find an itinerary with a \"days\" array inside it. " +
      "Make sure the \"Message a model\" node returns ONLY the itinerary JSON (see the system prompt), and that \"Respond to Webhook\" passes it through. " +
      "Raw preview: " + String(text).slice(0, 200));
  }

  const itin = normalizeItinerary(found, req);

  // Optional, non-blocking weather enrichment
  if (ENABLE_OPEN_METEO_FALLBACK) {
    const missingWeather = itin.days.some(d => d.weather.temperature == null);
    if (missingWeather) {
      try { await enrichWeather(itin, req); } catch (e) { /* non-blocking */ }
    }
  }
  return itin;
}

/* Open-Meteo (free, keyless) weather enrichment */
async function enrichWeather(itin, req) {
  const place = (req && req.destination ? req.destination : itin.destination).split(",")[0].trim();
  if (!place) return;
  const geoRes = await fetch("https://geocoding-api.open-meteo.com/v1/search?count=1&name=" + encodeURIComponent(place));
  if (!geoRes.ok) return;
  const geo = await geoRes.json();
  if (!geo.results || !geo.results[0]) return;
  const { latitude, longitude } = geo.results[0];
  const start = req && req.startDate, end = req && req.endDate;
  if (!start || !end) return;
  const url = "https://api.open-meteo.com/v1/forecast?latitude=" + latitude + "&longitude=" + longitude +
    "&daily=temperature_2m_max,precipitation_probability_max,weathercode,windspeed_10m_max" +
    "&timezone=auto&start_date=" + start + "&end_date=" + end;
  const fRes = await fetch(url);
  if (!fRes.ok) return;
  const f = await fRes.json();
  const daily = f.daily;
  if (!daily || !daily.time) return;
  itin.days.forEach((d, i) => {
    if (i >= daily.time.length) return;
    if (d.weather.temperature == null && daily.temperature_2m_max[i] != null)
      d.weather.temperature = Math.round(daily.temperature_2m_max[i]);
    if (daily.precipitation_probability_max && daily.precipitation_probability_max[i] != null && !d.weather.rainProbability)
      d.weather.rainProbability = daily.precipitation_probability_max[i];
    if (daily.windspeed_10m_max && daily.windspeed_10m_max[i] != null && (!d.weather.wind || d.weather.wind === "Light winds"))
      d.weather.wind = "Up to " + Math.round(daily.windspeed_10m_max[i]) + " km/h";
    const code = daily.weathercode ? daily.weathercode[i] : null;
    if (code != null) d.weather.icon = wmoToIcon(code, d.weather.icon);
  });
}
function wmoToIcon(code, fallback) {
  if ([51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code)) return "rain";
  if ([0,1].includes(code)) return "sun";
  if ([2].includes(code)) return "partly";
  if ([3,45,48].includes(code)) return "cloud";
  return fallback || "partly";
}

/* ============================================================
   Date helpers
   ============================================================ */
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parseDate(s){ if(!s) return null; const p=s.split("-"); if(p.length!==3) return null; const d=new Date(+p[0],+p[1]-1,+p[2]); return isNaN(d)?null:d; }
function friendlyDate(s){ const d=parseDate(s); if(!d) return s||""; return DOW[d.getDay()]+" "+d.getDate()+" "+MON[d.getMonth()]; }
function friendlyRange(a,b){ const da=parseDate(a),db=parseDate(b); if(!da||!db) return ""; const yr=db.getFullYear(); return DOW[da.getDay()]+" "+da.getDate()+" — "+DOW[db.getDay()]+" "+db.getDate()+" "+MON[db.getMonth()]+" "+yr; }
function daysBetween(a,b){ const da=parseDate(a),db=parseDate(b); if(!da||!db) return 0; return Math.round((db-da)/86400000)+1; }

function Segmented({ options, value, onChange }) {
  return (
    <div className="seg-group">
      {options.map(o => (
        <button type="button" key={o.v}
          className={"seg" + (value === o.v ? " active" : "")}
          onClick={() => onChange(o.v)}>
          <span className="seg-main">{o.v}</span>
          {o.sub && <span className="seg-sub">{o.sub}</span>}
        </button>
      ))}
    </div>
  );
}
function Chips({ options, value, onToggle, multi }) {
  const active = (o) => multi ? value.includes(o) : value === o;
  return (
    <div className="chips">
      {options.map(o => (
        <button type="button" key={o}
          className={"chip" + (active(o) ? " active" : "")}
          onClick={() => onToggle(o)}>
          {multi && <span className="dot" />}{o}
        </button>
      ))}
    </div>
  );
}
function Field({ label, required, hint, error, children, refEl }) {
  return (
    <div className={"field" + (error ? " invalid" : "")} ref={refEl}>
      <div className="field-label">
        {label}{required && <span className="req">*</span>}

      </div>
      {children}
      {error && <div className="err-msg"><Ic.alert width="14" height="14" />{error}</div>}

// Build external (new-tab) search links for flights & hotels — no booking/payment.
function bookingUrls(req, destination) {
  req = req || {};
  const departureCity = req.departureCity || "";
  const startDate = req.startDate || "";
  const endDate = req.endDate || "";
  const travelers = req.travelers;
  const dest = destination || req.destination || "";

  const fromPart = departureCity ? `from ${departureCity} ` : "";
  const datePart = (startDate && endDate) ? `on ${startDate} through ${endDate}`
                   : (startDate ? `on ${startDate}` : "");
  const fq = `Flights ${fromPart}to ${dest} ${datePart}`.trim();
  const flightsUrl = `https://www.google.com/travel/flights?q=${encodeURIComponent(fq)}`;

  const hp = [];
  if (startDate) hp.push(`checkin=${startDate}`);
  if (endDate)   hp.push(`checkout=${endDate}`);
  const guests = travelers ? `&guests=${travelers}` : "";
  const hotelsUrl =
    `https://www.google.com/travel/search?q=${encodeURIComponent("hotels in " + dest)}`
    + (hp.length ? `&${hp.join("&")}` : "") + guests;

  return { flightsUrl, hotelsUrl };
}

  if (variant === "card") {

}

// Lightweight markdown renderer for prose itineraries (bold, bullets, headings, rules)
function MiniMarkdown({ text }) {
  const inline = (s) => s.split(/(\*\*[^*]+\*\*)/g).map((part, i) =>
    (part.startsWith("**") && part.endsWith("**"))
      ? <strong key={i}>{part.slice(2, -2)}</strong> : <React.Fragment key={i}>{part}</React.Fragment>);
  const out = []; let key = 0; let bullets = null;
  const flush = () => { if (bullets) { out.push(<ul key={key++} className="md-ul">{bullets}</ul>); bullets = null; } };
  text.split(/\r?\n/).forEach((ln) => {
    const t = ln.trim();
    if (!t) { flush(); return; }
    if (/^([-*_]\s*){3,}$/.test(t) || /^---+$/.test(t)) { flush(); out.push(<hr key={key++} className="md-hr" />); return; }
    if (/^[-*•]\s+/.test(t)) { (bullets = bullets || []).push(<li key={key++}>{inline(t.replace(/^[-*•]\s+/, ""))}</li>); return; }
    flush();
    if (/^#{1,6}\s/.test(t)) { out.push(<h3 key={key++} className="md-h">{inline(t.replace(/^#{1,6}\s/, ""))}</h3>); return; }
    if (/^\*\*.+\*\*:?$/.test(t)) { out.push(<h4 key={key++} className="md-h">{inline(t)}</h4>); return; }
    out.push(<p key={key++} className="md-p">{inline(t)}</p>);
  });
  flush();
  return <div className="md">{out}</div>;
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,marginTop:18,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" onClick={onNew}>← Plan another trip</button>
          <button className="btn btn-soft" onClick={() => window.print()}>Save / Print</button>
        </div>
        <div className="itin-header">
          <div className="kicker"><Ic.spark width="15" height="15" /> Your itinerary is ready</div>
          <h1>{data.title}</h1>
          <div className="itin-meta">
            <span className="m"><Ic.pin /> {data.destination}</span>
            {data.dates && <span className="m"><Ic.cal /> {data.dates}</span>}
          </div>
          <BookingLinks urls={urls} />
        </div>
        <div className="info-banner">
          <span className="b-icon"><Ic.spark width="18" height="18" /></span>
          <div>The planner returned a text itinerary. For the full interactive day-by-day layout with weather cards, configure the model node to return JSON (see the setup guide).</div>
        </div>
        <div className="card"><MiniMarkdown text={data.__raw} /></div>
      </div>
    );
  }
  return (
    <div className="container fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,marginTop:18,flexWrap:"wrap"}}>
        <button className="btn btn-ghost" onClick={onNew}>← Plan another trip</button>
        <button className="btn btn-soft" onClick={() => window.print()}>Save / Print</button>
      </div>

      {data.__error && (
        <div className="banner" style={{marginTop:16}}>
          <span className="b-icon"><Ic.alert /></span>
          <div>
            <h4>We couldn’t build a full itinerary</h4>
            <p>{data.summary}</p>
          </div>
        </div>
      )}

      {/* Summary header */}
      <div className="itin-header">
        <div className="kicker"><Ic.spark width="15" height="15" /> Your itinerary is ready</div>
        <h1>{data.title}</h1>
        <div className="itin-meta">
          <span className="m"><Ic.pin /> {data.destination}</span>
          {data.dates && <span className="m"><Ic.cal /> {data.dates}</span>}
          <span className="m"><Ic.route width="18" height="18" /> {data.days.length} day{data.days.length>1?"s":""}</span>
          {data.origin && <span className="m"><Ic.arrow /> {data.origin}</span>}
        </div>
        {data.summary && !data.__error && <p className="itin-summary">{data.summary}</p>}
        {data.preferences && data.preferences.length > 0 && (
          <div className="pref-badges">
            {data.preferences.map((p, i) => <span className="pref-badge" key={i}>{p}</span>)}
          </div>
        )}
        <BookingLinks urls={urls} />
      </div>

      {/* Day column + weather sidebar */}
      <div className="itin-grid">
        <div className="stagger">
          {data.days.map((d, i) => <DayCard day={d} key={i} />)}
        </div>
        <aside className="weather-side">
          <BookingLinks urls={urls} variant="card" />
          <div className="side-title">Weather forecast</div>
          {data.days.map((d, i) => <WeatherCard day={d} key={i} />)}
        </aside>
      </div>
    </div>
  );
}

/* ============================================================
   App root
   ============================================================ */
function App() {
  const [theme, setTheme] = useState("light");
  const [accent, setAccent] = useState("indigo");
  const [view, setView] = useState("landing"); // landing | loading | itinerary
  const [itin, setItin] = useState(null);
  const [req, setReq] = useState(null);
  const formRef = useRef();

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
  useEffect(() => { document.documentElement.setAttribute("data-accent", accent); }, [accent]);

  const handleSubmit = async (req) => {
    setReq(req);
    setView("loading");
    window.scrollTo(0, 0);
    const result = await planTrip(req); // never rejects
    setItin(result);
    setView("itinerary");
    window.scrollTo(0, 0);
  };

  const goLanding = () => { setView("landing"); window.scrollTo(0, 0); };
  const scrollToForm = () => {
    if (view !== "landing") { setView("landing"); setTimeout(() => formRef.current && formRef.current.scrollIntoView({behavior:"smooth"}), 60); }
    else if (formRef.current) formRef.current.scrollIntoView({ behavior:"smooth" });
  };

  return (
    <>
      {view !== "loading" &&
        <Header theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent} onPlan={scrollToForm} />}

      {view === "landing"   && <Landing onSubmit={handleSubmit} formRef={formRef} />}
      {view === "loading"   && <Loading />}
      {view === "itinerary" && <Itinerary data={itin} req={req} onNew={goLanding} />}

      {view !== "loading" && <Footer />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
