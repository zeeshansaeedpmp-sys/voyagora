# Netlify config for Voyagora — static single-file site, no build step.
[build]
  publish = "."
  command = ""

# Serve index.html for any route (single-page app).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
